name: Build and Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'throw/**'
      - 'src/**'
      - '.github/config/build-and-deploy.fs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore and build generator
        run: |
          dotnet restore src/generator/Generator.fsproj
          dotnet build src/generator/Generator.fsproj --no-restore

      - name: Throw conversions
        run: |
          converted=false

          if [ -d "throw" ] && [ "$(find throw -maxdepth 1 -name '*.html' -type f 2>/dev/null | wc -l)" -gt 0 ]; then
            for f in throw/*.html; do
              name=$(basename "$f" .html)
              mkdir -p "throw/$name"
              echo "Converting HTML: $f -> throw/$name/index.fs"
              dotnet run --project src/generator/Generator.fsproj -- convert "$f" "throw/$name/index.fs"
            done
            echo "Converted HTML files are in throw/<filename>/index.fs"
            converted=true
          fi

          if [ -d "throw/files" ] && [ "$(find throw/files -type f 2>/dev/null | wc -l)" -gt 0 ]; then
            rm -rf "throw/convertedfiles"
            echo "Wrapping throw/files -> throw/convertedfiles"
            dotnet run --project src/generator/Generator.fsproj -- wrap-batch "throw/files" "throw/convertedfiles"
            converted=true
          fi

          if [ "$converted" = "false" ]; then
            echo "No throw inputs to convert"
            exit 0
          fi

          echo "Move converted files manually to your target site directory."
